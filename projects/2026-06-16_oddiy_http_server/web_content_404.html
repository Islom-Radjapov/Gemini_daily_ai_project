<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        body {
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #fcebeb; /* Light red background for error */
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            text-align: center;
        }
        .container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
            padding: 40px 50px;
            max-width: 600px;
            width: 90%;
            box-sizing: border-box;
            border-top: 5px solid #e74c3c; /* Red accent color */
        }
        h1 {
            color: #c0392b;
            margin-bottom: 20px;
            font-size: 3em;
            font-weight: 700;
        }
        p {
            font-size: 1.1em;
            line-height: 1.6;
            margin-bottom: 25px;
        }
        .status-code {
            font-size: 6em;
            font-weight: bold;
            color: #e74c3c; /* Red for emphasis */
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        a {
            color: #2196F3;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }
        a:hover {
            color: #0d47a1;
            text-decoration: underline;
        }
        .footer {
            margin-top: 30px;
            font-size: 0.9em;
            color: #7f8c8d;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-code">404</div>
        <h1>Page Not Found</h1>
        <p>Oops! The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
        <p>Please check the URL for errors, or return to the homepage.</p>
        <p><a href="/">Go to Homepage</a></p>
    </div>
    <div class="footer">
        <p>&copy; 2023 Simple Python Server Project</p>
    </div>
</body>
</html>
